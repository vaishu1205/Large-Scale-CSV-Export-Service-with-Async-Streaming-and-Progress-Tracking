version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: exporter
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: exports_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seeds/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./seeds/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exporter -d exports_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build: .
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: exporter
      DB_PASSWORD: secret
      DB_NAME: exports_db
      DATABASE_URL: postgresql://exporter:secret@db:5432/exports_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EXPORT_STORAGE_PATH: /app/exports
    volumes:
      - export_files:/app/exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 150m
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  export_files:
